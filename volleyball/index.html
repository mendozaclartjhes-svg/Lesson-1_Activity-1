<!DOCTYPE html>
<html>
    <head>
        <title>International Players</title>
        <style>
            body {
                font-size: 25px;
            }
            .players {
                display: flex;
                justify-content: flex-start;
                gap: 40px;
                margin: 20px 0;
                padding-left: 20px;
            }
            .player{
                width: 170px;
                position: relative;
            }
            .player img {
            width: 100%;
            height: auto;
            }
            .number {
            position: absolute;
            left: -20px;
            bottom: 0px;
            font-style: italic;
            text-decoration: underline;
            }
            .number-link {
                display: inline-block;
                width: 20px;
                text-align: center;
                font-style: italic;
                margin-right: 5px;
            }
        </style>
    </head>
    <body>
        <p>Hello! I am Clart &#128126!</p>
        <p>I am a &#127952 volleyball player.</p>
        <p>These are my top 3 Best Middle Blockers in international level:</p>
        <div class = "players">
            <div class="player">
            <img src="images/lucas.jpg" alt="Lucas Saatkamp">
            <div class="number">1</div>
        </div>

        <div class="player">
            <img src="images/maxwell.jpg" alt="Maxwell Holt">
            <div class="number">2</div>
        </div>

        <div class="player">
            <img src="images/srecko.jpg" alt="Srecko Lisinac">
            <div class="number">3</div>
        </div>
        </div>
        <p>Click the following links to know more about them!</p>

        
        <div class="number-link">1</div><a href="https://en.wikipedia.org/wiki/Lucas_Saatkamp" target="_blank">Lucas Saatcamp</a>
        <div class="number-link">2</div><a href="https://en.wikipedia.org/wiki/Maxwell_Holt" target="_blank">Maxwell Holt</a>
        <div class="number-link">3</div><a href="https://en.wikipedia.org/wiki/Sre%C4%87ko_Lisinac" target="_blank">Srecko Lisinac</a>
        
    </body>
</html>
